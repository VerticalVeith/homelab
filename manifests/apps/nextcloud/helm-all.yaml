apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextcloud
  namespace: argocd
spec:
  destination:
    namespace: nextcloud
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: nextcloud
    repoURL: https://nextcloud.github.io/helm/
    targetRevision: 9.0.5
    helm:
      valuesObject:
        nextcloud:
          configs:
            proxy.config.php: |-
              <?php
              $CONFIG = array (
                'overwrite.cli.url' => 'https://cloud.buergerhoff.com',
                'overwriteprotocol' => 'https',
                'trusted_domains' => array (
                    0 => '127.0.0.1',
                    1 => 'cloud.buergerhoff.com',
                    2 => 'cloud.buergerhoff.lan',
                    3 => 'localhost',
                    4 => 'nextcloud',
                    5 => 'nextcloud.kube.home',
                  ),
              );
        service:
          annotations:
            traefik.ingress.kubernetes.io/service.sticky.cookie: "true"

        internalDatabase:
          enabled: false

        externalDatabase:        
          enabled: true
          type: postgresql
          existingSecret:
            enabled: true
            secretName: cluster-nextcloud-app
            usernameKey: user
            passwordKey: password
            hostKey: host
            databaseKey: dbname

        persistence:
          enabled: true
          storageClass: local-data
          size: 24Gi
          nextcloudData:
            enabled: true
            storageClass: local-data
            accessMode: ReadWriteOnce
          nextcloudData.size: 8Gi
        extraManifests:
          - apiVersion: traefik.io/v1alpha1
            kind: IngressRoute
            metadata:
              name: nextcloud
            spec:
              entryPoints:
                - websecure
              routes:
                - kind: Rule
                  match: Host(`cloud.buergerhoff.com`)
                  services:
                    - kind: Service
                      name: nextcloud
                      port: 8080
                      passHostHeader: true
                      responseForwarding:
                        flushInterval: 1ms
                      scheme: http
              tls:
                certResolver: main

          - apiVersion: postgresql.cnpg.io/v1
            kind: Cluster
            metadata:
              name: cluster-nextcloud
            spec:
              imageName: ghcr.io/cloudnative-pg/postgresql:16-minimal-trixie
              instances: 1
              storage:
                size: 4Gi
                storageClass: local-data

              bootstrap:
                pg_basebackup:
                  source: source-db

              externalClusters:
                - name: source-db
                  connectionParameters:
                    host: 192.168.12.31
                    user: streaming_replica
                  password:
                    name: source-db-replica-user
                    key: password

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      enabled: true
      prune: true
      selfHeal: true

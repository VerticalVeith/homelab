apiVersion: v1
kind: Service
metadata:
  name: homeassistant-vm
  namespace: home-assistant
spec:
  type: ExternalName
  externalName: 192.168.12.218
  ports:
    - name: http
      port: 8123
      targetPort: 8123
      protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homeassistant
  namespace: home-assistant
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`home.buergerhoff.com`)
      services:
        - kind: Service
          name: homeassistant-vm
          port: 8123
          passHostHeader: true
          responseForwarding:
            flushInterval: 1ms
          scheme: http
  tls:
    certResolver: main
